<!DOCTYPE html>
<html>
<head>
    <style>
        table{
            border-collapse:collapse;
            width:100%;
        }

        th,td{
            padding:10px;
            border-bottom:1px solid #ddd;
        }

        .green{color:green}
        .red{color:red}

        .ai{
            background:#f4f6f8;
            padding:20px;
            border-radius:10px;
            margin-top:20px
        }
    </style>
</head>
<body>
    <h2>Portfolio</h2>

    <table>
        <tr>
            <th>Name</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Profit</th>
            <th>%</th>
        </tr>

        {% for r in rows %}
        <tr>
            <td>{{r.name}}</td>
            <td>{{r.qty}}</td>
            <td>{{r.price}}</td>

            <td class="{% if r.profit>0 %}green{% else %}red{% endif %}">
                {{r.profit}}
            </td>

            <td class="{% if r.perf>0 %}green{% else %}red{% endif %}">
                {{r.perf}} %
            </td>
        </tr>
        {% endfor %}
    </table>

    <div>
        {{ai|safe}}
    </div>
</body>
</html>
