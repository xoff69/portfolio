<h3>{{ pair }}</h3>

<div class="forex-debug">
    <p>Données chargées: {{ timestamps|length }} points temporels</p>
    <p>Prix: {{ prices|length }} | RSI: {{ rsi|length }} | MACD: {{ macd|length }}</p>
</div>

<div class="chart-container">
    <h4>Analyse Forex Complète</h4>
    <canvas id="forex-main-chart" width="800" height="400"></canvas>
</div>

<script>
console.log('=== Forex Data Debug ===');
const timestamps = {{ timestamps|tojson }};
const prices = {{ prices|tojson }};
const rsiData = {{ rsi|tojson }};
const macdData = {{ macd|tojson }};

console.log('Timestamps:', timestamps);
console.log('Prices:', prices);
console.log('RSI:', rsiData);
console.log('MACD:', macdData);

try {
    const ctx = document.getElementById('forex-main-chart').getContext('2d');
    
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: timestamps,
            datasets: [
                {
                    label: 'Prix ({{ pair }})',
                    data: prices,
                    borderColor: 'blue',
                    backgroundColor: 'rgba(0,0,255,0.1)',
                    yAxisID: 'y-price',
                    fill: false,
                    tension: 0.1
                },
                {
                    label: 'RSI',
                    data: rsiData,
                    borderColor: 'orange',
                    backgroundColor: 'rgba(255,165,0,0.1)',
                    yAxisID: 'y-rsi',
                    fill: false,
                    tension: 0.1
                },
                {
                    label: 'MACD',
                    data: macdData,
                    borderColor: 'green',
                    backgroundColor: 'rgba(0,255,0,0.1)',
                    yAxisID: 'y-macd',
                    fill: false,
                    tension: 0.1
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                mode: 'index',
                intersect: false
            },
            plugins: {
                title: {
                    display: true,
                    text: 'Analyse Technique - ' + '{{ pair }}'
                },
                legend: {
                    display: true,
                    position: 'top'
                }
            },
            scales: {
                x: {
                    display: true,
                    title: {
                        display: true,
                        text: 'Temps (H:M)'
                    }
                },
                'y-price': {
                    type: 'linear',
                    display: true,
                    position: 'left',
                    title: {
                        display: true,
                        text: 'Prix',
                        color: 'blue'
                    },
                    ticks: {
                        color: 'blue'
                    }
                },
                'y-rsi': {
                    type: 'linear',
                    display: true,
                    position: 'right',
                    title: {
                        display: true,
                        text: 'RSI (0-100)',
                        color: 'orange'
                    },
                    ticks: {
                        color: 'orange'
                    },
                    min: 0,
                    max: 100,
                    grid: {
                        drawOnChartArea: false
                    }
                },
                'y-macd': {
                    type: 'linear',
                    display: false, // Caché pour simplifier, mais données présentes
                    position: 'right'
                }
            }
        }
    });
    
    console.log('Graphique forex créé avec succès');
} catch (error) {
    console.error('Erreur création graphique forex:', error);
    document.querySelector('#forex-main-chart').parentNode.innerHTML = 
        '<p style="color:red;padding:20px;background:#fee;">Erreur graphique: ' + error.message + '</p>' +
        '<pre>' + JSON.stringify({timestamps:timestamps.length, prices:prices.length, rsi:rsiData.length, macd:macdData.length}, null, 2) + '</pre>';
}
</script>
